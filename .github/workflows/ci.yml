name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Byte-compile Python sources
        run: python -m py_compile main.py gui/main_window.py gui/tabs/*.py logic/*.py
      - name: Run logic/ unit tests (no ffmpeg required)
        run: python -m unittest discover -s tests -p "test_ffmpeg_logic.py" -v

  backend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Run logic/cli.py end-to-end regression test
        run: node tests/test_cli_bridge.cjs

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Build renderer + Electron main/preload
        run: npx vite build
